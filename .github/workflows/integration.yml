name: Backend Integration Tests

on:
  push:
  pull_request:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Start backend
        working-directory: backend
        run: |
          nohup node index.js > server.log 2>&1 &
          # wait for server to be up (tries /auth/login with retries)
          for i in {1..30}; do
            if curl -sS --fail http://localhost:4000/auth/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

      - name: Run integration tests
        working-directory: backend
        run: npm run test:integration
