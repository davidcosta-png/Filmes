version: '3.8'

services:
  traefik:
    image: traefik:v2.11
    command:
      - --providers.docker=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-stream}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-stream_pass}
      - POSTGRES_DB=${POSTGRES_DB:-stream}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-stream}:${POSTGRES_PASSWORD:-stream_pass}@postgres:5432/${POSTGRES_DB:-stream}
      - USE_HTTPS=0
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET}
      - AWS_REGION=${AWS_REGION}
      - BACKUP_S3_PREFIX=${BACKUP_S3_PREFIX}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=le"
    volumes:
      - ./backend/data:/usr/src/app/data
    depends_on:
      - postgres
    restart: unless-stopped

  backup-runner:
    image: node:18-alpine
    environment:
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET}
      - AWS_REGION=${AWS_REGION}
      - BACKUP_S3_PREFIX=${BACKUP_S3_PREFIX}
      - BACKUP_KEY=${BACKUP_KEY}
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-stream}:${POSTGRES_PASSWORD:-stream_pass}@postgres:5432/${POSTGRES_DB:-stream}
    volumes:
      - ./backend:/usr/src/app
    depends_on:
      - backend
      - postgres
    restart: unless-stopped
    command: sh -c "while true; do node /usr/src/app/backup-and-upload.js || true; sleep ${BACKUP_INTERVAL_SECONDS:-86400}; done"

volumes:
  traefik-letsencrypt:
  backend-data:
  postgres-data:
