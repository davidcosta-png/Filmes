version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - JWT_SECRET=${JWT_SECRET:-replace_with_secure_secret_in_production}
      - ADMIN_USER=${ADMIN_USER:-}
      - ADMIN_PASS=${ADMIN_PASS:-}
    volumes:
      - ./backend/data:/usr/src/app/data
    restart: unless-stopped

# Optional: add a reverse proxy (Traefik) with labels on the backend service for automatic TLS
# To enable Traefik place the traefik service below and add the necessary labels to 'backend' section.
# This compose file focuses on persisting the SQLite DB so admin credentials survive server restarts.
