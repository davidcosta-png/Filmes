version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - JWT_SECRET=${JWT_SECRET:-replace_with_secure_secret_in_production}
    volumes:
      - ./backend/users.json:/usr/src/app/users.json
    restart: unless-stopped

